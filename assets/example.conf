# sample hyprlogin.conf
#
# rendered text in all widgets supports pango markup (e.g. <b> or <i> tags)
#
# shortcuts:
# - ESC on an empty password field returns to username entry
# - ESC / Ctrl+U / Ctrl+Backspace clear the current field
# - Tab / Shift+Tab cycle the selected session
#
# active config path: /etc/hyprlogin/hyprlogin.conf
# if that file does not exist, hyprlogin falls back to the installed example config
#
# optional greeter defaults:
# sessions:default_user = your_username
# sessions:default_session = hyprland.desktop
#

$font = Monospace

general {
    hide_cursor = false
    immediate_render = true
    exit_command = hyprctl dispatch exit
    fail_timeout = 4000
    debug_mode = false
    debug_log_path = /tmp/hyprlogin-debug.log
}

# uncomment to enable fingerprint authentication
# auth {
#     fingerprint {
#         enabled = true
#         ready_message = Scan fingerprint to unlock
#         present_message = Scanning...
#         retry_delay = 250 # in milliseconds
#     }
# }

animations {
    enabled = true
    bezier = linear, 1, 1, 0, 0
    animation = fadeIn, 1, 5, linear
    animation = fadeOut, 1, 5, linear
    animation = inputFieldDots, 1, 2, linear
}

background {
    monitor =
    path = /usr/share/hypr/wall2.png
    blur_passes = 3
}

input-field {
    monitor =
    size = 20%, 5%
    outline_thickness = 3
    inner_color = rgba(0, 0, 0, 0.0)

    outer_color = rgba(33ccffee) rgba(00ff99ee) 45deg
    check_color = rgba(00ff99ee) rgba(ff6633ee) 120deg
    fail_color = rgba(ff6633ee) rgba(ff0066ee) 40deg

    font_color = rgb(255, 255, 255)
    fade_on_empty = false
    rounding = 15

    font_family = $font
    placeholder_text = Input password...
    placeholder_text_username = Input username...
    fail_text = $FAIL
    # check_text = Authenticating...

    # uncomment to use a letter instead of a dot to indicate the typed password
    # dots_text_format = *
    # dots_size = 0.4
    dots_spacing = 0.3

    # uncomment to use an input indicator that does not show the password length (similar to swaylock's input indicator)
    # hide_input = true

    position = 0, -20
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    font_size = 90
    font_family = $font

    position = -30, 0
    halign = right
    valign = top
}

label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B %Y" # update every 60 seconds
    font_size = 25
    font_family = $font

    position = -30, -150
    halign = right
    valign = top
}

label {
    monitor =
    text = $LAYOUT
    font_size = 24
    onclick = hyprctl switchxkblayout all next

    position = 250, -20
    halign = center
    valign = center
}

label {
    monitor =
    text = $GREETD_SESSION
    font_size = 16
    color = rgba(200, 200, 200, 1.0)
    font_family = $font
    onclick = hyprlogin:session_next

    position = 30, 30
    halign = left
    valign = bottom
}
